name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  deployments: write
  pull-requests: write
  actions: read

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: pr-preview-${{ github.event.number }}
      url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run type check
        run: npm run typecheck

      - name: Build for preview
        run: npm run build
        env:
          VITE_BASE_PATH: /wiroom/pr-${{ github.event.number }}/

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Deploy to gh-pages
        id: deploy
        run: |
          # Ensure the pr directory exists
          mkdir -p gh-pages/pr-${{ github.event.number }}
          
          # Copy built files to the PR directory
          cp -r dist/* gh-pages/pr-${{ github.event.number }}/
          
          # Configure git
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add changes and commit
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Deploy PR #${{ github.event.number }} preview"
            git push origin gh-pages
          else
            echo "No changes to deploy"
          fi
          
          # Set preview URL
          PREVIEW_URL="https://${{ github.repository_owner }}.github.io/wiroom/pr-${{ github.event.number }}/"
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      - name: Create deployment
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            
            // Create a deployment
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: `pr-preview-${context.issue.number}`,
              description: `Preview deployment for PR #${context.issue.number}`,
              auto_merge: false,
              required_contexts: []
            });
            
            // Update deployment status to success
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              target_url: previewUrl,
              description: 'Preview deployed to GitHub Pages'
            });

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            
            // Find existing preview comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            
            const existingComment = comments.data.find(comment => 
              comment.user.login === 'github-actions[bot]' && 
              comment.body.includes('Preview deployment')
            );
            
            const commentBody = `## 🚀 Preview deployment

            Your changes are now live at:
            
            **🌐 [View Preview Site](${previewUrl})**
            
            This preview will be updated automatically when you push new changes to this PR.
            
            ---
            <sub>Preview deployment powered by GitHub Pages</sub>`;
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove PR preview directory
        run: |
          if [ -d "pr-${{ github.event.number }}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            rm -rf pr-${{ github.event.number }}
            git add .
            git commit -m "Remove PR #${{ github.event.number }} preview" || echo "Nothing to remove"
            git push origin gh-pages || echo "Nothing to push"
          else
            echo "PR preview directory not found"
          fi

      - name: Deactivate deployment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const environmentName = `pr-preview-${prNumber}`;
            
            try {
              // Get all deployments for this environment
              const deployments = await github.rest.repos.listDeployments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment: environmentName
              });
              
              // Mark deployments as inactive
              for (const deployment of deployments.data) {
                await github.rest.repos.createDeploymentStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id,
                  state: 'inactive',
                  description: 'Preview environment deactivated'
                });
              }
            } catch (error) {
              console.log('No deployments found to deactivate:', error.message);
            }

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            
            const commentBody = `## 🧹 Preview cleanup
            
            The preview deployment for this PR has been deactivated and removed.
            
            ---
            <sub>Cleanup completed by GitHub Actions</sub>`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });