name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  deployments: write
  pull-requests: write
  actions: read

concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment:
      name: pr-preview-${{ github.event.number }}
      url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run type check
        run: npm run typecheck

      - name: Build for preview
        run: npm run build
        env:
          VITE_BASE_PATH: /

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-preview-${{ github.event.number }}
          path: ./dist
          retention-days: 30

      - name: Create deployment
        id: deploy
        uses: actions/github-script@v7
        with:
          script: |
            // Create a deployment
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: `pr-preview-${context.issue.number}`,
              description: `Preview deployment for PR #${context.issue.number}`,
              auto_merge: false,
              required_contexts: []
            });
            
            // Create a URL to the workflow run where the artifact can be downloaded
            const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const previewUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            // Update deployment status to success
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              target_url: previewUrl,
              description: 'Preview build artifact available'
            });
            
            core.setOutput('preview_url', previewUrl);
            core.setOutput('deployment_id', deployment.data.id);

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            // Find existing preview comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            
            const existingComment = comments.data.find(comment => 
              comment.user.login === 'github-actions[bot]' && 
              comment.body.includes('Preview deployment')
            );
            
            const commentBody = `## 🚀 Preview deployment
            
            Your changes have been built and are available for preview:
            
            **📦 [Download Preview Artifact](${artifactUrl})**
            
            The build artifact contains the complete static site that you can extract and serve locally or deploy to any static hosting service.
            
            This preview will be updated automatically when you push new changes to this PR.
            
            ---
            <sub>Preview deployment powered by GitHub Actions</sub>`;
            
            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Deactivate deployment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const environmentName = `pr-preview-${prNumber}`;
            
            try {
              // Get all deployments for this environment
              const deployments = await github.rest.repos.listDeployments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment: environmentName
              });
              
              // Mark deployments as inactive
              for (const deployment of deployments.data) {
                await github.rest.repos.createDeploymentStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id,
                  state: 'inactive',
                  description: 'Preview environment deactivated'
                });
              }
            } catch (error) {
              console.log('No deployments found to deactivate:', error.message);
            }

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            
            const commentBody = `## 🧹 Preview cleanup
            
            The preview deployment for this PR has been deactivated.
            
            ---
            <sub>Cleanup completed by GitHub Actions</sub>`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody
            });